name: Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: npm install --no-audit --no-fund

      - name: Build site
        run: bundle exec middleman build

      - name: Accessibility check (axe-core against built site)
        env:
          A11Y_SKIP_BUILD: "1"
        run: bundle exec rake a11y
